name: Node.js CI

on:
  push:
    branches: [main]
    paths:
      - "web-components/**"
      - ".github/workflows/node.yml"
  pull_request:
    branches: [main]
    paths:
      - "web-components/**"
      - ".github/workflows/node.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-components
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-components/package-lock.json
      - run: npm install
      - run: npm run build
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-components
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-components/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run format
