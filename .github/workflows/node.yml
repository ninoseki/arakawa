name: Node.js CI

on:
  push:
    branches: [main]
    paths:
      - "web-components/**"
      - ".github/workflows/node.yml"
  pull_request:
    branches: [main]
    paths:
      - "web-components/**"
      - ".github/workflows/node.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-components
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-components/package-lock.json
      - run: npm run setup
      - run: npm run build
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-components
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-components/package-lock.json
      - run: npm run setup
      - run: npm run lint
      - run: npm run format
