name: Python CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/python.yml"
      - "python-client/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/python.yml"
      - "python-client/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", 3.11, 3.12, 3.13]
        pandas:
          - { spec: ">2.2,<3.0", key: "2.x" }
          - { spec: ">=3.0,<4.0", key: "3.x" }
        exclude:
          - python-version: "3.10"
            pandas: { spec: ">=3.0,<4.0", key: "3.x" }
    defaults:
      run:
        working-directory: ./python-client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        with:
          path: ~/.cache/uv
          key: uv-${{ matrix.python-version }}-${{ matrix.pandas.key }}-${{ hashFiles('uv.lock') }}
      - run: |
          uv sync --frozen --all-extras
          uv pip install "pandas${{ matrix.pandas.spec }}"
      - run: uv run pytest
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python-client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13
          cache: pip
      - run: pip install -r requirements.txt
      - uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        with:
          path: ~/.cache/uv
          key: uv-3.13-${{ hashFiles('uv.lock') }}
      - run: uv sync --frozen --all-extras
      - run: uv run uv-sort --check
      - run: uv run ruff check --output-format github src/
      - run: uv run ruff format --check src/
